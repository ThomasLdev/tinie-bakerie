name: CI

on:
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker images
        uses: docker/bake-action@v5
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max
      - name: Export Docker image
        run: docker save app-php | zstd -T0 -3 > /tmp/app-php.tar.zst
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-app-php
          path: /tmp/app-php.tar.zst
          retention-days: 1
  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-app-php
          path: /tmp
      - name: Load Docker image
        run: zstd -d < /tmp/app-php.tar.zst | docker load
      - name: Generate throwaway TLS certs for FrankenPHP
        run: |
          mkdir -p frankenphp/certs
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -subj "/CN=local.tinie-bakerie.com" \
            -keyout frankenphp/certs/local.tinie-bakerie.com-key.pem \
            -out  frankenphp/certs/local.tinie-bakerie.com.pem
      - name: Start services (including Node.js for linting)
        run: docker compose --profile dev up --wait --no-build
      - name: Run PHPStan
        run: make phpstan
      - name: Run PHPMD
        run: make phpmd
      - name: Run PHP CS Fixer
        run: make phpcs-dry
      - name: Run Twig CS
        run: make twig-linter
      - name: Install Node.js dependencies
        run: make node-install
      - name: Run Biome (JS + CSS lint + format check)
        run: make lint
      - name: Run TypeScript type check
        run: make typecheck
      - name: Run PHPUnit Unit Suite
        run: make test.unit
      - name: Run Vitest JS Unit Suite
        run: make test.js
  functional_test:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: [build, static_analysis]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-app-php
          path: /tmp
      - name: Load Docker image
        run: zstd -d < /tmp/app-php.tar.zst | docker load
      - name: Generate throwaway TLS certs for FrankenPHP
        run: |
          mkdir -p frankenphp/certs
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -subj "/CN=local.tinie-bakerie.com" \
            -keyout frankenphp/certs/local.tinie-bakerie.com-key.pem \
            -out  frankenphp/certs/local.tinie-bakerie.com.pem
      - name: Start services (production mode - no Node.js needed for PHP tests)
        run: docker compose up --wait --no-build
      - name: Create Test Database
        run: make doctrine-db-test-create
      - name: Run Migrations
        run: make doctrine-migrate-test
      - name: Run Fixtures
        run: make fixtures-test
      - name: Doctrine Schema Validator
        run: make doctrine-validate-schema
      - name: Run PHPUnit Functional Suite
        run: make test.functional
  e2e_tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build, static_analysis]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-app-php
          path: /tmp
      - name: Load Docker image
        run: zstd -d < /tmp/app-php.tar.zst | docker load
      - name: Generate throwaway TLS certs for FrankenPHP
        run: |
          mkdir -p frankenphp/certs
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -subj "/CN=local.tinie-bakerie.com" \
            -keyout frankenphp/certs/local.tinie-bakerie.com-key.pem \
            -out  frankenphp/certs/local.tinie-bakerie.com.pem
      # APP_ENV=test on php (from compose.ci.yaml) makes the docker-entrypoint wait for the
      # app_test DB and run migrations on it automatically. We must create app_test BEFORE
      # starting php, otherwise the entrypoint times out and the container goes unhealthy.
      - name: Start database
        run: docker compose -f compose.yaml -f compose.ci.yaml up -d --no-build database
      - name: Wait for database (pg_isready)
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T database pg_isready -U app >/dev/null 2>&1; then exit 0; fi
            sleep 1
          done
          echo "database never became ready" && exit 1
      - name: Create app_test database
        run: docker compose exec -T database createdb -U app app_test
      - name: Start php + node (entrypoint waits for app_test then runs migrations)
        run: docker compose -f compose.yaml -f compose.ci.yaml --profile dev up -d --wait --no-build
      - name: Run Fixtures
        run: make fixtures-test
      - name: Install Node.js dependencies
        run: make node-install
      - name: Build CSS bundle (lightningcss)
        run: make build-css
      - name: Install Playwright Dependencies
        run: make e2e-install
      - name: Run E2E Tests
        run: make test.e2e
        env:
          CI: true
      # Diagnostic dump on any failure in the job — surfaces the real reason behind
      # an unhealthy container (HEALTHCHECK output is in `docker inspect` Health.Log).
      - name: Capture Docker diagnostics on failure
        if: failure()
        run: |
          mkdir -p docker-diagnostics
          {
            echo "==== docker compose ps ===="
            docker compose -f compose.yaml -f compose.ci.yaml --profile dev ps -a
            echo
            echo "==== docker compose top ===="
            docker compose -f compose.yaml -f compose.ci.yaml --profile dev top || true
          } > docker-diagnostics/state.txt 2>&1
          for svc in php database node; do
            cid=$(docker compose -f compose.yaml -f compose.ci.yaml --profile dev ps -aq "$svc" || true)
            if [ -n "$cid" ]; then
              docker logs --details --timestamps "$cid" > "docker-diagnostics/${svc}.logs.txt" 2>&1 || true
              docker inspect "$cid" > "docker-diagnostics/${svc}.inspect.json" 2>&1 || true
            fi
          done
      - name: Upload Docker diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-diagnostics
          path: docker-diagnostics/
          retention-days: 30
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
  lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
