App\Entity\Post:
    properties:
        category:
            - NotNull:
                message: 'post.category.not_null'
        tags:
            - Valid: ~
        media:
            - Valid: ~
        sections:
            - Valid: ~
        readingTime:
            - NotNull: ~
            - Type:
                type: integer
            - GreaterThanOrEqual:
                value: 0
                message: 'post.reading_time.gte'
            - LessThanOrEqual:
                value: 300
                message: 'post.reading_time.lte'
        translations:
            - Valid: ~
            - App\Validator\Constraints\ValidTranslations: ~
