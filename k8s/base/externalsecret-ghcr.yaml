---
# Generator: produces a fresh GitHub App installation token from the
# private key in `github-app-pem` (Secret applied imperatively in this
# namespace — never in git, this is the bootstrap exception). The token
# is short-lived (~60 min); ESO regenerates it automatically per the
# ExternalSecret refreshInterval below.
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: ghcr-token
  namespace: tinie-bakerie
spec:
  appID: "3646419"
  installID: "130621644"
  permissions:
    packages: read
  auth:
    privateKey:
      secretRef:
        name: github-app-pem
        key: privateKey
---
# ExternalSecret: wraps the generated GitHub token into a
# `kubernetes.io/dockerconfigjson` Secret named `ghcr-secret`, which
# the Deployment uses as imagePullSecret to pull from ghcr.io.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-secret
  namespace: tinie-bakerie
spec:
  refreshInterval: 30m
  target:
    name: ghcr-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "x-access-token",
                "password": "{{ .token }}",
                "auth": "{{ printf "x-access-token:%s" .token | b64enc }}"
              }
            }
          }
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: ghcr-token
