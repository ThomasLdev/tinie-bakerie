apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: infisical
  namespace: tinie-bakerie
spec:
  provider:
    infisical:
      # Pointed at Infisical Cloud (free tier). The previous self-hosted
      # instance under infrastructure/base/infisical/ in tldev-infra is
      # being decommissioned in a follow-up commit.
      hostAPI: https://app.infisical.com
      auth:
        tokenAuthCredentials:
          accessToken:
            key: accessToken
            name: infisical-machine-identity
      secretsScope:
        projectSlug: tinie-bakerie-m8j-b
        environmentSlug: staging
        secretsPath: /
