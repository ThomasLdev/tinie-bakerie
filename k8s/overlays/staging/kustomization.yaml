apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
# Image tag is rewritten in place by Flux ImageUpdateAutomation
# every time CI publishes a new ghcr.io tag matching the
# `tinie-bakerie-staging` ImagePolicy. The marker comment is what tells
# the automation which line to update — do not remove it.
images:
  - name: ghcr.io/thomasldev/tinie-bakerie
    newTag: 20260509171234-45f06e4 # {"$imagepolicy": "flux-system:tinie-bakerie-staging:tag"}
